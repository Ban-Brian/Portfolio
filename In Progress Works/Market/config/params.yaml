random_seed: 42

dgp:
  n_observations: 200000
  train_fraction: 0.7

  # Covariate distributions
  spread_loc: -2.0
  spread_scale: 0.6
  depth_scale: 50.0
  volatility_scale: 0.02

  # Treatment (confounded by market state)
  treatment_noise_scale: 5.0
  treatment_depth_coef: 0.3
  treatment_vol_coef: -10.0

  # Outcome — true CATE: τ(X) = β₀ + β₁/depth + β₂·vol
  baseline_drift_scale: 0.001
  cate_intercept: 0.0005
  cate_depth_coef: 0.5
  cate_vol_coef: 0.05
  outcome_noise_scale: 0.002

  # AR(1) autocorrelation in noise (0 = IID)
  ar1_coefficient: 0.3

features:
  volatility_window: 20
  winsorize_percentile: 0.01

estimators:
  causal_forest:
    n_estimators: 1000
    min_samples_leaf: 20
    max_depth: null
    discrete_treatment: false

  s_learner:
    base_model: "GradientBoostingRegressor"
    n_estimators: 200

  t_learner:
    base_model: "GradientBoostingRegressor"
    n_estimators: 200

  x_learner:
    base_model: "GradientBoostingRegressor"
    n_estimators: 200

  dr_learner:
    base_model: "GradientBoostingRegressor"
    n_estimators: 200

  binary_treatment_quantile: 0.75

evaluation:
  n_bootstrap: 200
  ci_level: 0.90
  n_cate_bins: 5

output:
  results_dir: "results"
  figure_format: "png"
  figure_dpi: 300
